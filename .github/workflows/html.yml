name: HTML Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: htmlhint "**/*.html" || echo "No HTML files found"

      - name: Check for broken links
        run: |
          echo "Link validation skipped — add htmlhint-plugin for external link checks"
